<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生成长画像系统 - 全流程编辑旗舰版</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --success: #10b981; --info: #6366f1; --warning: #f59e0b; --danger: #ef4444; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: #334155; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 顶部导航 */
        .top-nav { background: #fffbe6; padding: 15px 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #ffe58f; display: flex; align-items: center; gap: 20px; }
        .top-nav input { flex-grow: 1; padding: 10px; border: 1px solid #d9d9d9; border-radius: 8px; outline: none; }

        .section { margin: 30px 0; padding: 25px; border: 1px solid #f1f5f9; border-radius: 18px; background: #fff; }
        .section h3 { border-left: 5px solid var(--accent); padding-left: 15px; color: var(--primary); margin: 0 0 25px 0; background: #f8fafc; padding-block: 10px; font-size: 18px; border-radius: 0 8px 8px 0; }

        /* 问卷卡片 */
        .question-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .q-wrap { background: #fcfcfc; border: 1px solid #f1f5f9; padding: 18px; border-radius: 12px; transition: 0.2s; }
        .q-wrap:hover { border-color: var(--accent); background: #fff; }
        .q-label { display: block; font-weight: 700; margin-bottom: 12px; font-size: 14px; color: #475569; }
        .opt-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .opt-item { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #fff; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; }
        .opt-item input { width: 16px; height: 16px; accent-color: var(--accent); }
        .opt-item.checked { background: #eff6ff; border-color: var(--accent); }

        /* 进度条 */
        .sticky-progress { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .p-bar { height: 10px; background: #edf2f7; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        .p-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.4s; }

        /* 数字化档案卡 */
        .portrait-card { border: 2px solid #000; border-radius: 0; background: #fff; font-family: 'JetBrains Mono', 'Noto Sans SC'; margin-top: 20px; }
        .p-header { background: #000; color: #fff; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .p-body { padding: 40px; font-size: 14px; }
        
        /* 按钮与通用 */
        .btn-group { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-gray { background: #e2e8f0; color: #475569; }
        button:hover { transform: translateY(-2px); filter: brightness(0.9); }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .loading { display: none; text-align: center; padding: 60px; color: var(--accent); font-weight: bold; }
        
        .stu-card { background: #fff; border: 1px solid var(--border); padding: 25px; border-radius: 20px; cursor: pointer; text-align: center; transition: 0.3s; }
        .stu-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(52,152,219,0.1); }
    </style>
</head>

<body>
<div class="container">
    <div class="top-nav">
        <i class="fas fa-key"></i>
        <strong>系统接入授权:</strong>
        <input type="password" id="api_key" placeholder="填入 API Key 激活 AI 数据转换引擎">
    </div>

    <div id="page1" class="page active">
        <div style="text-align:center; margin-bottom:40px;">
            <h1 style="font-size:30px;"><i class="fas fa-users-cog"></i> 学生成长画像名册中心</h1>
            <p style="color:#64748b;">批量入库 ➜ 全维度数据记录 ➜ 画像档案查阅</p>
        </div>

        <div class="grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
            <button class="btn-info" onclick="showPage(5)" style="height:70px; font-size:16px;"><i class="fas fa-archive"></i> 进入画像档案文库</button>
            <button class="btn-success" onclick="showPage(2)" style="height:70px; font-size:16px;"><i class="fas fa-user-plus"></i> 选择学生开启/编辑测评</button>
        </div>

        <div class="section">
            <h3><i class="fas fa-file-import"></i> 智能名单导入</h3>
            <textarea id="batchInput" rows="4" style="width:100%; border-radius:10px; padding:15px; border:1px solid #ddd; font-size:13px;" placeholder="粘贴格式：姓名,性别,班级,上课时间 (支持Excel多行粘贴)"></textarea>
            <div class="btn-group">
                <button class="btn-primary" onclick="importStudents()">✨ 智能识别并同步名册</button>
                <button class="btn-gray" onclick="exportBackup()">全库导出备份</button>
                <button class="btn-gray" onclick="document.getElementById('importFile').click()">导入备份文件</button>
                <input type="file" id="importFile" style="display:none" onchange="importBackup(this)">
            </div>
            <table id="stuTable" style="margin-top:20px;">
                <thead><tr><th>姓名</th><th>班级</th><th>识别层级</th><th>画像状态</th><th style="width:280px;">管理操作</th></tr></thead>
                <tbody></tbody>
            </table>
            <div style="text-align:right; margin-top:20px;"><button class="btn-danger" onclick="clearAllData()">⚠️ 清空数据库</button></div>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="header" style="text-align:center;"><h1>选择测评对象</h1><p>点击学生进入测评或继续编辑</p></div>
        <div id="studentGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:20px; margin-top:30px;"></div>
        <div class="btn-group"><button class="btn-gray" onclick="showPage(1)">返回主页</button></div>
    </div>

    <div id="page3" class="page">
        <div class="sticky-progress">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; padding:0 10px;">
                <span id="p-text">维度观测进度: 0/0</span>
                <span id="save-hint" style="color:var(--success);"><i class="fas fa-check-circle"></i> 实时自动同步已开启</span>
            </div>
            <div class="p-bar"><div id="p-fill" class="p-fill"></div></div>
        </div>
        <div id="dynamicSurvey"></div>
        <div class="btn-group">
            <button class="btn-gray" onclick="showPage(2)">← 返回选人</button>
            <button class="btn-primary" onclick="generatePortrait()">✨ 提取实时数据生成/更新画像</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div id="loading" class="loading"><i class="fas fa-microchip fa-spin fa-3x"></i><br><br>正在对 45 维度全量数据进行深度语义转换...</div>
        <div id="portraitOutput"></div>
        <div class="btn-group">
            <button class="btn-info" onclick="copyPortrait()">复制自解释文档</button>
            <button class="btn-success" onclick="saveToArchive()">存入/更新至文库</button>
            <button class="btn-gray" onclick="showPage(2)">测评下一位</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <h1>画像档案文库</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn-info" onclick="downloadAllMerged()">汇总导出全员档案(.md)</button>
                <button class="btn-gray" onclick="showPage(1)">返回主页</button>
            </div>
        </div>
        <div id="libraryContent" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top:25px;"></div>
    </div>
</div>

<script>
// --- 终极 45 维度、8层级测评模版库 ---
const SURVEY_CORE = {
    preschool: [
        { group: "1. 家庭与个人背景", items: [
            { id: "p1", label: "家中排行", type: "radio", opts: ["独生子女","老大","老二","老三及以后"] },
            { id: "p2", label: "主要教养人", type: "radio", opts: ["父母","祖辈","保姆","混合"] },
            { id: "p3", label: "如厕自理情况", type: "radio", opts: ["完全自理","需脱提裤辅助","需提醒"] },
            { id: "p4", label: "乐高接触史", type: "radio", opts: ["经常玩","偶尔","从不"] },
            { id: "p5", label: "屏幕时间/天", type: "radio", opts: ["无接触","<30min","30-60min",">1h"] }
        ]},
        { group: "2. 气质社交与安抚 (L1-L2核心)", items: [
            { id: "p6", label: "气质类型", type: "radio", opts: ["活泼型","谨慎型","平和型","敏感型"] },
            { id: "p7", label: "分离焦虑程度", type: "radio", opts: ["无","轻度","中度","明显"] },
            { id: "p8", label: "有效安抚方式", type: "radio", opts: ["拥抱","转移注意力","称赞细节","陪伴"] },
            { id: "p9", label: "同伴互动模式", type: "radio", opts: ["主动交友","跟随","平行","独自"] },
            { id: "p10", label: "规则/等待意识", type: "radio", opts: ["良好","需提醒","困难"] }
        ]},
        { group: "3. 动作与认知发展 (L3-L4核心)", items: [
            { id: "p11", label: "精细动作(工具固定)", type: "radio", opts: ["灵活精准","需引导","力量不足"] },
            { id: "p12", label: "手眼协调精确度", type: "radio", opts: ["精准","一般","需练习"] },
            { id: "p13", label: "结构稳定性意识", type: "radio", opts: ["主动加固底部","堆砌为主","垂直支撑"] },
            { id: "p14", label: "想象力倾向", type: "radio", opts: ["天马行空","务实模仿","两者平衡"] }
        ]},
        { group: "4. 表达与沟通", items: [
            { id: "p15", label: "指令理解", type: "radio", opts: ["完全理解","需简化","动作配合"] },
            { id: "p16", label: "因果表达能力", type: "radio", opts: ["清晰因果","简单词汇","有限"] }
        ]}
    ],
    primary_low: [
        { group: "1. 学习素质与心态", items: [
            { id: "l1", label: "参与度", type: "radio", opts: ["积极举手","被动答","沉默观察"] },
            { id: "l2", label: "胜负心理反应", type: "radio", opts: ["胜不骄败不馁","赢了开心输了急","不关心"] },
            { id: "l3", label: "合作与竞争", type: "radio", opts: ["善于分工","争抢","独立"] }
        ]},
        { group: "2. 逻辑与机械能力 (L5-SPIKE)", items: [
            { id: "l4", label: "逻辑思维等级", type: "radio", opts: ["1星","2星","3星","4星","5星"] },
            { id: "l5", label: "空间想象等级", type: "radio", opts: ["1星","2星","3星","4星","5星"] },
            { id: "l6", label: "编程理解(循环)", type: "radio", opts: ["清晰","模仿","初次接触"] },
            { id: "l7", label: "排障调试耐心", type: "radio", opts: ["耐心试","一般","易放弃"] }
        ]},
        { group: "3. 学科基础与习惯", items: [
            { id: "l8", label: "数学逻辑基础", type: "radio", opts: ["超前","优秀","一般","加强"] },
            { id: "l9", label: "识字阅读能力", type: "radio", opts: ["自主阅读","需辅助","较弱"] },
            { id: "l10", label: "书写/键盘速度", type: "radio", opts: ["快且精准","慢但整齐","需练习"] }
        ]}
    ],
    primary_high: [
        { group: "1. 学习成熟度 (Kitten-AI)", items: [
            { id: "h1", label: "自主规划力", type: "radio", opts: ["强","中","弱"] },
            { id: "h2", label: "目标意识", type: "radio", opts: ["清晰","模糊","被动"] },
            { id: "h3", label: "元认知能力", type: "radio", opts: ["精准自评","大概模糊","不清楚"] }
        ]},
        { group: "2. 专业技术与 AI 素养", items: [
            { id: "h4", label: "指法/规范习惯", type: "radio", opts: ["标准盲打","准但慢","寻键模式"] },
            { id: "h5", label: "代码缩进规范", type: "radio", opts: ["极致规范","可读","无排版"] },
            { id: "h6", label: "AI 协作深度", type: "radio", opts: ["熟练驾驭","索取答案","抗拒"] },
            { id: "h7", label: "Prompt 编写逻辑", type: "radio", opts: ["精准有效","简短模糊","需大幅指导"] }
        ]},
        { group: "3. 竞赛与项目观", items: [
            { id: "h8", label: "抗压能力", type: "radio", opts: ["享受挑战","过急在意输赢","紧张发挥失常"] },
            { id: "h9", label: "MVP 迭代意识", type: "radio", opts: ["强","一般","求一次通过"] },
            { id: "h10", label: "团队角色定位", type: "radio", opts: ["Leader","核心执行","创意提供","配合者"] }
        ]}
    ]
};

// --- 数据引擎 ---
let studentDB = JSON.parse(localStorage.getItem('stu_full_logic_v16')) || [];
let activeStu = null;
let currentMD = "";

// 批量导入
function importStudents() {
    const raw = document.getElementById('batchInput').value.trim();
    if(!raw) return;
    raw.split('\n').forEach(line => {
        const p = line.trim().split(/[,\s\t]+/).filter(i => i);
        if(p.length >= 3) {
            let levelKey = "primary_low";
            if(/意识|管道|发现|螺丝刀|发明|动力/.test(p[2])) levelKey = "preschool";
            if(/AICODE|AI03|代码|英雄/.test(p[2])) levelKey = "primary_high";
            if(!studentDB.find(s => s.name === p[0])) {
                studentDB.push({ name:p[0], sex:p[1], class:p[2], time:p.slice(3).join(' '), level:levelKey, md:"", progress:{} });
            }
        }
    });
    saveDb(); renderTable(); document.getElementById('batchInput').value = "";
}

function saveDb() { localStorage.setItem('stu_full_logic_v16', JSON.stringify(studentDB)); }

function renderTable() {
    const tbody = document.querySelector('#stuTable tbody');
    tbody.innerHTML = studentDB.map((s, i) => `
        <tr><td><b>${s.name}</b></td><td>${s.class}</td><td><small>${s.level}</small></td>
        <td>${s.md ? '<span style="color:var(--success)">● 已有画像</span>' : '<span style="color:#999">○ 待测</span>'}</td>
        <td>
            <button class="btn-warning" style="padding:4px 8px; font-size:11px;" onclick="openSurvey('${s.name}')">编辑测评内容</button>
            <button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="delStu(${i})">删除</button>
        </td></tr>`).join('');
}

// --- 问卷重编写与加载逻辑 (核心修改) ---
function openSurvey(name) {
    activeStu = studentDB.find(s => s.name === name);
    const container = document.getElementById('dynamicSurvey');
    
    // 初始化基础信息与 Remark
    container.innerHTML = `<div class="section"><h3>档案基本信息锁定: ${activeStu.name}</h3>
        <p style="font-size:13px; color:#666; margin-bottom:10px;">班级：${activeStu.class} | 性别：${activeStu.sex} | 时间：${activeStu.time}</p>
        <textarea id="remark" placeholder="手动输入课堂细节记录..." oninput="autoSave()">${activeStu.progress.remark || ''}</textarea></div>`;

    // 动态加载问卷内容
    SURVEY_CORE[activeStu.level].forEach(group => {
        let html = `<div class="section"><h3>${group.group}</h3><div class="question-grid">`;
        group.items.forEach(item => {
            const savedVal = activeStu.progress[item.id] || ""; // 获取历史保存值
            html += `<div class="q-wrap"><label class="q-label">${item.label}</label>`;
            if(item.type === "radio") {
                html += `<div class="opt-group">`;
                item.opts.forEach(o => {
                    const isChecked = (savedVal === o) ? 'checked' : '';
                    html += `<label class="opt-item ${isChecked ? 'checked' : ''}">
                        <input type="radio" name="${item.id}" value="${o}" ${isChecked} onchange="autoSave()"> ${o}
                    </label>`;
                });
                html += `</div>`;
            } else {
                html += `<input type="text" name="${item.id}" value="${savedVal}" placeholder="${item.placeholder}" oninput="autoSave()">`;
            }
            html += `</div>`;
        });
        container.innerHTML += html + `</div></div>`;
    });

    updatePBar();
    showPage(3);
}

// 实时保存：每点一下就同步到对应的学生对象里
function autoSave() {
    const data = { remark: document.getElementById('remark').value };
    document.querySelectorAll('#dynamicSurvey input:checked, #dynamicSurvey input[type=text]').forEach(i => {
        if(i.name) data[i.name] = i.value;
    });
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].progress = data; // 直接存入名册
    
    // 处理勾选状态的样式反馈
    document.querySelectorAll('.opt-item').forEach(label => {
        const input = label.querySelector('input');
        if(input && input.checked) label.classList.add('checked');
        else label.classList.remove('checked');
    });

    saveDb();
    updatePBar();
}

function updatePBar() {
    const total = document.querySelectorAll('.q-wrap').length;
    const done = Object.keys(activeStu.progress).filter(k => k !== 'remark' && activeStu.progress[k] !== "").length;
    document.getElementById('p-fill').style.width = (total ? (done/total)*100 : 0) + "%";
    document.getElementById('p-text').innerText = `测评/编辑进度: ${done}/${total}`;
}

// --- 画像生成逻辑 ---
async function generatePortrait() {
    const key = document.getElementById('api_key').value.trim();
    if(!key) return alert("API Key Required");
    showPage(4); document.getElementById('loading').style.display='block';
    
    const prompt = `你是顶级教育评价专家。请将以下测评数据转化为一份高可读性的“数字化画像卡”。
    姓名：${activeStu.name}，班级：${activeStu.class}，数据：${JSON.stringify(activeStu.progress)}。
    
    要求：
    1. 必须涵盖所有勾选维度。
    2. 使用 [维度名 | 观测状态 | 详细定义] 格式，确保第三方也能读懂画像。
    3. 包含 Markdown 可视化属性表。
    4. 严禁主观废话，严禁建议。
    5. 最后输出加粗的一句话画像速览。`;

    try {
        const res = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
            body:JSON.stringify({model:"glm-4-flash", messages:[{role:"user",content:prompt}]})
        });
        const d = await res.json(); currentMD = d.choices[0].message.content;
        renderPortraitCard(activeStu, currentMD);
    } catch(e) { alert("AI生成出错"); } finally { document.getElementById('loading').style.display='none'; }
}

function renderPortraitCard(stu, md) {
    document.getElementById('portraitOutput').innerHTML = `
        <div class="portrait-card">
            <div class="p-header"><h2>${stu.name}</h2><span>STATUS: UPDATED</span></div>
            <div class="p-body">${marked.parse(md)}</div>
        </div>`;
}

function saveToArchive() {
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].md = currentMD; 
    saveDb(); 
    alert("档案库已同步更新！"); 
    showPage(5); 
}

// --- 系统辅助功能 ---
function showPage(n) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(`page${n}`).classList.add('active'); if(n===2) renderGrid(); if(n===5) renderLibrary(); window.scrollTo(0,0); }
function renderGrid() { document.getElementById('studentGrid').innerHTML = studentDB.map(s => `<div class="stu-card" onclick="openSurvey('${s.name}')"><b>${s.name}</b><br><small>${s.class}</small><br>${s.md?'<span style="color:var(--success);font-size:10px;">✔ 已画像</span>':''}</div>`).join(''); }
function renderLibrary() { document.getElementById('libraryContent').innerHTML = studentDB.filter(s => s.md).map(s => `<div class="stu-card" onclick="viewOld('${s.name}')"><h4>${s.name}</h4><small>${s.class}</small><br><button class="btn-primary" style="margin-top:10px; width:100%;">查看画像</button></div>`).join(''); }
function viewOld(name) { const s = studentDB.find(st => st.name === name); activeStu = s; currentMD = s.md; showPage(4); renderPortraitCard(s, s.md); }
function delStu(i) { if(confirm("彻底删除？")) { studentDB.splice(i, 1); saveDb(); renderTable(); } }
function clearAllData() { if(confirm("清空库？")) { studentDB = []; saveDb(); renderTable(); } }
function exportBackup() { const blob = new Blob([JSON.stringify(studentDB)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'growth_db_backup.json'; a.click(); }
function importBackup(input) { const reader = new FileReader(); reader.onload = function(){ studentDB = JSON.parse(reader.result); saveDb(); renderTable(); }; reader.readAsText(input.files[0]); }
function copyPortrait() { navigator.clipboard.writeText(currentMD).then(() => alert("已复制 Markdown")); }
function downloadAllMerged() { const blob = new Blob([studentDB.filter(s => s.md).map(s => `# 姓名: ${s.name}\n${s.md}`).join('\n\n---\n\n')], {type:'text/markdown'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'merged_profiles.md'; a.click(); }

window.onload = function() { renderTable(); document.getElementById('api_key').value = localStorage.getItem('zhipu_api_key') || ''; }
</script>
</body>
</html>
