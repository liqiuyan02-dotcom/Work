<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育智库 - 深度学生画像系统 (多维多选版)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f9; --border: #e2e8f0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); padding: 20px; color: #333; line-height: 1.6; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .api-config { background: #fff5f5; padding: 15px 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #fed7d7; display: flex; align-items: center; gap: 15px; font-size: 14px; color: #c53030; }
        .api-config input { flex-grow: 1; padding: 10px; border: 1px solid #fc8181; border-radius: 6px; outline: none; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--primary); margin-bottom: 8px; font-size: 30px; }
        .header p { color: #7f8c8d; font-size: 15px; }
        
        h3 { border-left: 5px solid var(--accent); padding-left: 15px; margin-top: 40px; margin-bottom: 20px; color: var(--primary); background: #f8f9fa; padding-block: 12px; border-radius: 0 6px 6px 0; font-size: 18px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        label.main-label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 15px; color: #2d3748; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(52,152,219,0.15); }
        input[readonly] { background-color: #f7fafc; color: #a0aec0; }
        
        /* 多选框面板专属样式 */
        #dynamic_questions { display: flex; flex-direction: column; gap: 25px; margin-top: 15px; }
        .question-block { background: #fdfefe; border: 1px solid #e1e8ed; border-radius: 10px; padding: 20px; transition: 0.2s; }
        .question-block:hover { border-color: #bee3f8; box-shadow: 0 4px 12px rgba(52,152,219,0.05); }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px;}
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .checkbox-item { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 14px; color: #4a5568; line-height: 1.4; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .checkbox-item:hover { background-color: #f0f7ff; }
        .checkbox-item input[type="checkbox"] { margin-top: 2px; cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent); }
        
        .btn-group { margin-top: 40px; display: flex; gap: 20px; flex-wrap: wrap; }
        button { flex: 1; min-width: 200px; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-gen:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-gen:disabled { background: #a0aec0; cursor: not-allowed; }
        .btn-export { background: var(--success); color: white; display: none; }
        
        #previewContainer { margin-top: 50px; display: none; }
        #previewBox { padding: 40px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.04); line-height: 1.8; color: #2d3748; }
        #previewBox h1 { color: var(--primary); border-bottom: 2px solid #edf2f7; padding-bottom: 12px; font-size: 26px; margin-top: 0;}
        #previewBox h2 { color: var(--accent); margin-top: 30px; font-size: 20px; }
        #previewBox h3 { color: #4a5568; font-size: 16px; margin-top: 20px; background: none; border: none; padding: 0;}
        #previewBox blockquote { border-left: 4px solid var(--accent); padding-left: 15px; margin: 15px 0; color: #718096; background: #f7fafc; padding-block: 10px; border-radius: 0 8px 8px 0; }
        
        .loading { display: none; text-align: center; padding: 30px; color: var(--accent); font-weight: bold; font-size: 18px; }
        .loading i { animation: spin 1.5s linear infinite; margin-right: 10px; font-size: 24px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="api-config">
        <i class="fas fa-key" style="font-size: 18px;"></i>
        <strong>API KEY:</strong>
        <input type="password" id="api_key" placeholder="在此填入 Gemini API Key (自动缓存在本地)">
    </div>

    <div class="header">
        <h1>学生成长画像建档系统</h1>
        <p><i class="fas fa-tags"></i> 行为标签多选模式，还原学生真实且立体的学习状态</p>
    </div>
    
    <form id="profileForm">
        <h3>一、学生快速检索</h3>
        <div class="grid">
            <div class="full-width">
                <label class="main-label"><i class="fas fa-search"></i> 选择现有学生 (自动加载基础信息及专属评估维度)</label>
                <select id="student_select" onchange="autoFillStudent()">
                    <option value="">-- 请选择学生快速填充 --</option>
                </select>
            </div>
            <div>
                <label class="main-label">姓名</label>
                <input type="text" id="stu_name" required>
            </div>
            <div>
                <label class="main-label">性别</label>
                <input type="text" id="stu_gender" readonly>
            </div>
            <div>
                <label class="main-label">班级/课程</label>
                <input type="text" id="stu_class" readonly>
            </div>
            <div>
                <label class="main-label">上课时间</label>
                <input type="text" id="stu_time" readonly>
            </div>
        </div>

        <h3>二、专项行为评估 (可多选，勾选符合其近期表现的描述)</h3>
        <div id="dynamic_questions">
            <p style="color:#a0aec0; text-align: center; font-size: 15px; padding: 20px 0;">
                <i class="fas fa-info-circle"></i> 请先在上方选择学生，系统将自动生成对应的多选行为标签面板。
            </p>
        </div>

        <h3>三、通用特质补充</h3>
        <div class="grid">
            <div>
                <label class="main-label">性格基调</label>
                <select id="stu_temp">
                    <option value="平和/包容/稳定">平和/包容/稳定</option>
                    <option value="活泼/外向/跳跃">活泼/外向/跳跃</option>
                    <option value="果断/好胜/主见强">果断/好胜/主见强</option>
                    <option value="严谨/敏感/在意细节">严谨/敏感/在意细节</option>
                </select>
            </div>
            <div class="full-width">
                <label class="main-label"><i class="fas fa-pen-nib"></i> 补充文字说明 (选填，AI 会将这些细节融入报告中)</label>
                <textarea id="focus_tags" rows="3" placeholder="例如：最近几次课特别容易走神，喜欢跟同桌聊天；虽然代码写得乱，但是很有创意；需要老师多用积分奖励刺激..."></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-gen" id="genBtn" onclick="generateAIProfile()">
                <i class="fas fa-magic"></i> ✨ 综合生成 AI 画像报告
            </button>
            <button type="button" id="downloadBtn" class="btn-export" onclick="downloadMD()">
                <i class="fas fa-file-download"></i> 导出 MD 文档
            </button>
        </div>
    </form>

    <div id="loading" class="loading">
        <i class="fas fa-spinner"></i> AI 正在深度交叉分析多维行为标签，为您撰写定制化报告...
    </div>

    <div id="previewContainer">
        <h3 style="background: none; border: none; padding: 0; margin-bottom: 20px;">
            <i class="fas fa-file-alt"></i> 报告预览
        </h3>
        <div id="previewBox"></div>
    </div>
</div>

<script>
    const studentDB = [
        {name:"梁昕乔", sex:"女", class:"发现世界", time:"周四 19:00-20:00"},
        {name:"钟昀昊", sex:"男", class:"发现世界", time:"周四 19:00-20:00"},
        {name:"林瀚丞", sex:"男", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"杨佳兴", sex:"男", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"余韫", sex:"女", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"林嘉铭", sex:"男", class:"发现世界", time:"周六 09:00-10:00"},
        {name:"李怡瞳", sex:"女", class:"AICODE-03", time:"周五 19:00-20:30"},
        {name:"沙佩琪", sex:"女", class:"AICODE-03", time:"周五 19:00-20:30"},
        {name:"黄榆斐", sex:"女", class:"AICODE-03", time:"周五 19:00-20:30"},
        {name:"陈昕柔", sex:"女", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"曾乐凯", sex:"男", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"李汶浩", sex:"男", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"李欣蓉", sex:"女", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"谢善诺", sex:"女", class:"AICODE-03", time:"周六 14:00-15:30"},
        {name:"梁家铭", sex:"男", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"简思瑜", sex:"男", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"简思霖", sex:"女", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"黄晓瑜", sex:"女", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"罗钧龄", sex:"男", class:"Wedo 创造世界", time:"周六 10:30-12:00"},
        {name:"马悦然", sex:"女", class:"Wedo 创造世界", time:"周六 16:00-17:30"},
        {name:"郭景鸣", sex:"男", class:"Wedo 创造世界", time:"周六 16:00-17:30"},
        {name:"冯彦哲", sex:"男", class:"Wedo 创造世界", time:"周六 16:00-17:30"},
        {name:"吴浩洋", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"吴浩骏", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"王骏诚", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"洪一栩", sex:"男", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"邓琬曦", sex:"女", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"邓琬颖", sex:"女", class:"SPIKE02", time:"周日 10:30-12:00"},
        {name:"方柳莫", sex:"女", class:"SPIKE02", time:"周日 10:30-12:00"}
    ];

    window.onload = () => {
        const select = document.getElementById('student_select');
        studentDB.sort((a,b) => a.class.localeCompare(b.class)).forEach((s, index) => {
            select.options.add(new Option(`[${s.class}] - ${s.name}`, index));
        });
        const cachedKey = localStorage.getItem('gemini_api_key');
        if(cachedKey) document.getElementById('api_key').value = cachedKey;
    };

    function autoFillStudent() {
        const val = document.getElementById('student_select').value;
        if(val === "") return;
        const s = studentDB[val];
        document.getElementById('stu_name').value = s.name;
        document.getElementById('stu_gender').value = s.sex;
        document.getElementById('stu_class').value = s.class;
        document.getElementById('stu_time').value = s.time;
        renderDynamicQuestions(s.class);
    }

    let currentQuestionsData = []; // 保存当前题目的配置，方便提取数据

    function renderDynamicQuestions(className) {
        const box = document.getElementById('dynamic_questions');
        box.innerHTML = '';
        currentQuestionsData = [];

        // 针对不同课程的精细化多选行为标签库
        if(className.includes("发现世界")) {
            currentQuestionsData = [
                {id: 'q1', title: '<i class="fas fa-cubes"></i> 动手与空间搭建', opts: ['能精准拼接小尺寸零件', '大块积木拼接顺畅', '经常需要老师手把手辅助', '能识别常见几何图形', '能在图纸和实物间建立联系', '经常出现搭建方向颠倒或镜像']},
                {id: 'q2', title: '<i class="fas fa-eye"></i> 观察与专注力', opts: ['能敏锐发现图纸上的细节', '主要依赖模仿老师的搭建动作', '经常漏掉关键步骤或零件', '能够安坐专注15分钟以上', '容易被周围同学干扰或吸引', '遇到感兴趣的主题会极度专注']},
                {id: 'q3', title: '<i class="fas fa-smile-beam"></i> 情绪与互动表达', opts: ['作品倒塌或搭错能自己平静重建', '遇到拼错会主动举手求助', '拼错时容易发脾气或哭闹', '能大声介绍自己的作品', '喜欢和同伴分享零件', '偏好独自玩耍，不愿交流']}
            ];
        } 
        else if(className.includes("Wedo")) {
            currentQuestionsData = [
                {id: 'q1', title: '<i class="fas fa-cogs"></i> 机械结构与排障', opts: ['理解齿轮传动等简单物理原理', '经常装错受力点导致结构不稳', '只会照图纸拼，不懂机械原理', '发现不转会先检查连接线', '遇到问题直接停滞等待', '会主动向同伴或老师请教原因']},
                {id: 'q2', title: '<i class="fas fa-laptop-code"></i> 编程启蒙与创造', opts: ['理解事件触发(如点击绿旗)', '能使用简单的循环和条件模块', '对代码块的作用完全不理解', '喜欢在标准模型上加装饰', '能改变代码参数观察不同效果', '完全不愿偏离标准答案']},
                {id: 'q3', title: '<i class="fas fa-users"></i> 习惯与团队合作', opts: ['能按颜色/形状分类收纳零件', '经常弄丢小零件或桌面极度杂乱', '提醒后能主动收拾器材', '能与搭档合理分配搭建和编程任务', '经常与搭档争抢核心操作权', '完全无法合作，各干各的']}
            ];
        }
        else if(className.includes("SPIKE")) {
            currentQuestionsData = [
                {id: 'q1', title: '<i class="fas fa-robot"></i> 软硬协同与工程思维', opts: ['能准确定位是代码Bug还是硬件Bug', '会使用测试代码辅助排查硬件', '严重依赖老师帮忙找Bug', '搭建时会考虑受力支撑与结构加固', '结构松散，运行时经常散架', '不愿花时间优化物理结构']},
                {id: 'q2', title: '<i class="fas fa-code-branch"></i> 逻辑与输入基础', opts: ['熟练运用条件判断(If-Else)', '理解传感器数值反馈并能灵活应用', '仅能死记硬背抄写参数，不懂原理', '有中英文状态和全半角标点的切换意识', '能较为熟练地使用键盘打字', '打字速度缓慢(单指禅)或抗拒打字']},
                {id: 'q3', title: '<i class="fas fa-comments"></i> 项目复盘与数学思维', opts: ['能清晰讲解代码与硬件的联动原理', '能说出项目中遇到的困难及解决办法', '只能简单演示作品，不知过程', '能理解并运用变量记录数据', '理解笛卡尔坐标系概念', '需要具象生活案例辅助才能理解抽象概念']}
            ];
        }
        else if(className.includes("AICODE")) {
            currentQuestionsData = [
                {id: 'q1', title: '<i class="fas fa-keyboard"></i> 代码编写与打字规范', opts: ['熟练盲打且中英文标点切换准确', '速度中等，需要看键盘找键', '打字极慢，经常因为全半角或拼写报错', '代码缩进和模块排版非常规范', '命名随意，写的是毫无结构的面条式代码', '有写注释标记代码功能的习惯']},
                {id: 'q2', title: '<i class="fas fa-project-diagram"></i> 抽象算法与元认知', opts: ['轻松驾驭多重循环与嵌套逻辑', '能熟练使用函数/列表等高级数据结构', '遇到复杂逻辑容易大脑宕机，依赖抄写', '动手敲代码前有画流程图/写伪代码的习惯', '边写边改走一步看一步，缺乏全局观', '写完能跑通即可，缺乏优化和反思意识']},
                {id: 'q3', title: '<i class="fas fa-robot"></i> AI协作与排障(Debug)', opts: ['习惯优先查看控制台红字报错日志定位', '遇到报错直接放弃思考，立马呼叫老师', '通过打印(Print)调试定位数据流向', '能清晰描述需求并引导AI生成或修改代码', '仅仅把AI当成索取现成答案的作弊工具', '遇到难题死磕到底，有钻研的韧劲']}
            ];
        }

        // 渲染复选框 UI
        currentQuestionsData.forEach(q => {
            let html = `
                <div class="question-block">
                    <div class="question-title">${q.title}</div>
                    <div class="checkbox-grid" id="${q.id}">
                        ${q.opts.map((opt, i) => `
                            <label class="checkbox-item">
                                <input type="checkbox" name="${q.id}" value="${opt}">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
            box.insertAdjacentHTML('beforeend', html);
        });
    }

    let finalMD = "";
    async function generateAIProfile() {
        const key = document.getElementById('api_key').value.trim();
        if(!key) { alert("⚠️ 请在页面顶部填入 Gemini API Key"); return; }
        localStorage.setItem('gemini_api_key', key);

        const stuName = document.getElementById('stu_name').value;
        const stuClass = document.getElementById('stu_class').value;
        const stuTemp = document.getElementById('stu_temp').value;
        const focusTags = document.getElementById('focus_tags').value;

        if(!stuName || !stuClass) { alert("⚠️ 请先选择或填写学生基本信息"); return; }

        // 收集所有勾选的多选标签
        let selectedBehaviors = [];
        currentQuestionsData.forEach(q => {
            const checkboxes = document.querySelectorAll(`input[name="${q.id}"]:checked`);
            if(checkboxes.length > 0) {
                let sectionLabel = q.title.replace(/<[^>]+>/g, '').trim(); // 移除图标HTML标签
                let vals = Array.from(checkboxes).map(cb => cb.value).join("、");
                selectedBehaviors.push(`- **${sectionLabel}**: 表现出“${vals}”的特征。`);
            }
        });

        if(selectedBehaviors.length === 0) {
            alert("⚠️ 请至少在『二、专项行为评估』中勾选几个符合学生的行为标签！");
            return;
        }

        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');
        const previewBox = document.getElementById('previewBox');
        const genBtn = document.getElementById('genBtn');

        genBtn.disabled = true;
        loading.style.display = 'block';
        previewContainer.style.display = 'none';

        const prompt = `你是一位深谙 STEM 教学法的资深教育专家。请根据以下教师收集到的多维度的行为标签，将这些离散的现象融合、升华，生成一份逻辑严密、专业客观的 Markdown 格式学生画像。

【一、 学生基础】
- 姓名：${stuName}
- 课程属性：${stuClass} (请注意区分是实体搭建、软硬结合，还是纯代码课程)
- 性格基调：${stuTemp}
- 教师补充的特别关注细节：${focusTags || "无补充，依据评估标签"}

【二、 本次评估提炼的实际行为标签（多选题结果）】
${selectedBehaviors.join('\n')}

【三、 撰写要求】

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if(!response.ok) throw new Error("API 请求失败");
            const res = await response.json();
            finalMD = res.candidates[0].content.parts[0].text;
            
            previewBox.innerHTML = marked.parse(finalMD);
            previewContainer.style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'flex';
            previewContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
        } catch (e) {
            alert("❌ 生成失败！请确认：\n1. API Key 正确无多余空格\n2. 您的网络已开启全局代理\n3. 稍后再试(避免触发限流)");
            console.error(e);
        } finally {
            genBtn.disabled = false;
            loading.style.display = 'none';
        }
    }

    function downloadMD() {
        const stuName = document.getElementById('stu_name').value || "学生";
        const blob = new Blob([finalMD], { type: 'text/markdown;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `[评估档案]_${stuName}_${new Date().toISOString().slice(0,10)}.md`;
        a.click();
    }
