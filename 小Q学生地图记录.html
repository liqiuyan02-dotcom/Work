<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小Q老师 - 星际闯关指挥中心 2.0</title>
<style>
    :root {
        --primary: #ff6b6b;
        --secondary: #4ecdc4;
        --tertiary: #45b7d1;
        --gold: #ffd700;
        --pink: #ff8fab;
        --purple: #9b59b6;
        --green: #2ecc71;
        --yellow: #f1c40f;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        background-color: var(--bg-color);
        background-image: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
        margin: 0; padding: 20px; color: #333; min-height: 100vh;
    }
    h1 { text-align: center; color: #2c3e50; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); letter-spacing: 1px; margin-bottom: 20px; }
    
    /* 控制面板 */
    .admin-controls {
        max-width: 1200px;
        margin: 0 auto 30px;
        display: flex;
        justify-content: center;
        gap: 15px;
    }
    .admin-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #2c3e50;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .admin-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); background: var(--secondary); color: white; }
    .admin-btn.primary { background: var(--primary); color: white; }

    .day-group { margin-bottom: 35px; background: rgba(255,255,255,0.4); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    .day-title { font-size: 1.8em; color: #2c3e50; border-bottom: 3px solid var(--secondary); padding-bottom: 8px; margin-bottom: 20px; font-weight: 800; display: flex; align-items: baseline; gap: 10px; }
    
    /* 班级标题行与通知折叠面板 */
    .class-header-row { display: flex; align-items: center; justify-content: space-between; margin: 25px 0 15px 0; flex-wrap: wrap; gap: 10px; }
    .class-section-title { font-size: 1.2em; color: #34495e; padding: 6px 12px; background: linear-gradient(to right, #e0eafc, #cfdef3); border-left: 5px solid var(--primary); border-radius: 4px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; margin: 0; }
    
    .reminder-btn { background: #fff; border: 1px solid var(--secondary); color: var(--secondary); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .reminder-btn:hover { background: var(--secondary); color: white; transform: translateY(-2px); }
    
    .reminder-panel { display: none; background: #f0f7ff; border: 1px dashed #cce5ff; border-radius: 10px; padding: 15px; margin-bottom: 20px; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .reminder-content-wrapper { display: flex; gap: 15px; align-items: stretch; }
    .reminder-preview { flex: 1; background: white; padding: 12px; border-radius: 8px; border: 1px solid #e1ecf4; font-size: 0.95em; color: #444; white-space: pre-wrap; line-height: 1.6; }
    .reminder-actions { display: flex; flex-direction: column; gap: 10px; width: 90px; }
    .reminder-actions button { border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
    .btn-refresh { background: #f39c12; } .btn-refresh:hover { background: #e67e22; }
    .btn-copy { background: var(--secondary); flex: 1; } .btn-copy:hover { background: #2c3e50; }

    /* 学生卡片 */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 10px; }
    .student-card { background: var(--card-bg); border-radius: 12px; padding: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: all 0.3s; border-left: 6px solid var(--secondary); position: relative; overflow: hidden; }
    .student-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(58, 123, 213, 0.2); border-left-color: var(--primary); }
    
    .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .student-name { font-size: 1.3em; font-weight: 800; color: #2c3e50; display: flex; align-items: center; gap: 5px; }
    .student-nickname { font-size: 0.7em; color: #e67e22; background: rgba(230, 126, 34, 0.1); padding: 2px 8px; border-radius: 10px; font-weight: normal; }
    .copy-icon { font-size: 0.8em; cursor: pointer; color: #7f8c8d; transition: 0.2s; padding: 2px; }
    .copy-icon:hover { color: var(--secondary); transform: scale(1.2); }

    .student-info { font-size: 0.9em; color: #607d8b; margin-bottom: 4px; display: flex; align-items: center; }
    .student-info::before { content: '•'; color: var(--secondary); margin-right: 5px; font-size: 1.2em; }

    .stats-container { margin-top: 12px; padding-top: 12px; border-top: 2px dashed #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 0.92em; font-weight: bold; }
    .stat-attend { color: var(--secondary); }
    .stat-reward { color: #f39c12; }
    .highlight-score { color: #e74c3c; font-size: 1.25em; margin: 0 3px; }

    /* --- 模态框通用 --- */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-content { background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); width: 95%; max-width: 650px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0, 210, 255, 0.3); color: #fff; border: 1px solid rgba(0, 210, 255, 0.2); padding: 20px; }
    
    .input-modal-content { background: white; color: #333; max-width: 500px; padding: 30px; border-radius: 15px; }
    .input-modal-content h3 { margin-top: 0; color: #2c3e50; }
    .input-modal-content textarea { width: 100%; height: 150px; margin: 15px 0; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; resize: none; }
    .input-modal-content .tip { font-size: 0.85em; color: #666; background: #f8f9fa; padding: 8px; border-radius: 4px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
    .btn-confirm { background: var(--secondary); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .btn-cancel { background: #eee; color: #666; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; }

    /* --- 星际地图绘制 --- */
    .map-header { position: sticky; top: 0; background: rgba(9, 10, 15, 0.95); backdrop-filter: blur(10px); text-align: center; padding: 20px; border-bottom: 1px solid rgba(0, 210, 255, 0.3); z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    .map-header h2 { font-size: 1.8em; margin: 0 0 5px 0; text-shadow: 0 0 10px var(--primary); display: flex; justify-content: center; align-items: center; gap: 8px; }
    .map-header p { color: rgba(255,255,255,0.8); margin: 0 0 10px 0; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2em; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; z-index: 101; }
    .close-btn:hover { color: #ff7675; transform: rotate(90deg); }

    .map-container { display: flex; flex-direction: column; align-items: center; position: relative; padding: 50px 0 80px 0; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 5px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px); background-size: 550px 550px, 350px 350px, 250px 250px; background-position: 0 0, 40px 60px, 130px 270px; }
    .treasure-path { stroke-dasharray: 15, 15; animation: flow 1.5s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -30; } }
    .level-row { width: 100%; display: flex; justify-content: center; margin: 45px 0; position: relative; z-index: 2; }
    .level-row:nth-child(even) { transform: translateX(-80px); }
    .level-row:nth-child(odd) { transform: translateX(80px); }
    .node-wrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 70px; }
    .current-week-tag { position: absolute; top: -75px; background: #e74c3c; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.85em; font-weight: bold; box-shadow: 0 0 10px rgba(231, 76, 60, 0.6); animation: bounce 1.5s infinite; white-space: nowrap; z-index: 20; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .course-title-label { position: absolute; top: -45px; white-space: nowrap; background: rgba(0, 0, 0, 0.6); color: var(--primary); padding: 6px 12px; border-radius: 15px; font-size: 0.9em; font-weight: bold; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); border: 1px solid rgba(0, 210, 255, 0.5); pointer-events: none; z-index: 10; backdrop-filter: blur(2px); }
    
    .level-node { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(145deg, #2c3e50, #000); color: rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.4em; cursor: pointer; border: 3px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5); transition: all 0.4s; user-select: none; position: relative; z-index: 5;}
    .level-node.completed { background: linear-gradient(145deg, #ffd700, #f39c12); border-color: #fff; color: #fff; text-shadow: 0 0 5px #c0392b; box-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold), inset 0 0 10px rgba(255,255,255,0.8); animation: pulse-gold 2s infinite; }

    .score-controller { position: absolute; left: 100%; margin-left: 25px; display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.1); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); user-select: none; backdrop-filter: blur(5px); z-index: 5; min-width: 100px;}
    .stars-display { font-size: 1.1em; margin-bottom: 6px; letter-spacing: 2px; text-shadow: 0 0 8px rgba(255, 215, 0, 0.8); min-height: 20px; display: flex; justify-content: center; flex-wrap: wrap; max-width: 90px;}
    .score-buttons-row { display: flex; align-items: center; gap: 5px; }
    .score-btn { width: 32px; height: 32px; border-radius: 50%; border: none; font-weight: bold; font-size: 1.4em; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; color: #fff; }
    .score-btn.minus { background: linear-gradient(to bottom, #e74c3c, #c0392b); }
    .score-btn.plus { background: linear-gradient(to bottom, #2ecc71, #27ae60); }
    .score-display { min-width: 28px; text-align: center; margin: 0 10px; font-weight: 800; color: var(--gold); font-size: 1.2em; text-shadow: 0 0 10px var(--gold); }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 9999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(20px); }
</style>
</head>
<body>

<h1>👨‍🏫 小Q老师 - 星际闯关指挥中心</h1>

<div class="admin-controls">
    <button class="admin-btn primary" onclick="showModal('addStudentModal')">➕ 添加新探险家</button>
    <button class="admin-btn" onclick="showModal('attendanceModal')">📍 批量签到点亮</button>
    <button class="admin-btn" onclick="resetAllData()">⚠️ 重置所有数据</button>
</div>

<div id="main-container"></div>

<div class="toast" id="toast">提示信息</div>

<div class="modal" id="addStudentModal">
    <div class="modal-content input-modal-content">
        <h3>➕ 招募新探险家</h3>
        <div class="tip">格式：姓名|周几|课程名称|上课时间<br>例如：王小明|周六|发现世界|10:30-12:00</div>
        <textarea id="newStudentInput" placeholder="在此粘贴或输入学员信息..."></textarea>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('addStudentModal')">取消</button>
            <button class="btn-confirm" onclick="addNewStudents()">确认添加</button>
        </div>
    </div>
</div>

<div class="modal" id="attendanceModal">
    <div class="modal-content input-modal-content">
        <h3>📍 批量点亮星际地图</h3>
        <div class="tip">直接粘贴今天到课的学生名字，系统会自动点亮本周（第5周）的关卡星球。</div>
        <textarea id="attendanceInput" placeholder="每行一个名字，例如：&#10;林瀚丞&#10;梁昕乔"></textarea>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('attendanceModal')">取消</button>
            <button class="btn-confirm" onclick="batchCheckIn()">一键点亮</button>
        </div>
    </div>
</div>

<div class="modal" id="mapModal">
    <div class="modal-content">
        <div class="map-header">
            <span class="close-btn" onclick="closeMap()">×</span>
            <h2 id="modalStudentName">学生姓名</h2>
            <p id="modalStudentInfo">课程信息</p>
        </div>
        <div class="map-container" id="mapContainer"></div>
    </div>
</div>

<script>
// --- 核心配置 ---
const courseData = {
    "意识世界": Array(20).fill({title:"意识探索"}),
    "发现世界": Array(20).fill({title:"规律发现"}),
    "发明世界": Array(20).fill({title:"机械零件"}),
    "动力机械": Array(20).fill({title:"动力传输"}),
    "创造世界": Array(20).fill({title:"编程创造"}),
    "spike": Array(20).fill({title:"机器人挑战"}),
    "AI03": Array(20).fill({title:"人工智能"})
};

const nicknameMap = {
    "林瀚丞": "丞丞", "梁昕乔": "乔乔", "钟昀昊": "昊昊", "李怡瞳": "怡瞳",
    "沙佩琪": "佩琪", "李梓宁": "梓宁", "余韫": "袋袋", "冯彦哲": "乐乐"
};

const dayOrder = { '周一':1, '周二':2, '周三':3, '周四':4, '周五':5, '周六':6, '周日':7 };

// --- 数据初始化 ---
let students = JSON.parse(localStorage.getItem('xq_students_list')) || [];

// 如果是第一次运行，加载默认数据
if (students.length === 0) {
    const rawData = `
    梁昕乔｜周四｜发现世界｜19:00-20:00｜
    钟昀昊｜周四｜发现世界｜19:00-20:00｜
    李怡瞳｜周五｜AICODE-03｜19:00-20:30｜
    沙佩琪｜周五｜AICODE-03｜19:00-20:30｜
    林瀚丞｜周六｜发现世界｜09:00-10:00｜
    `;
    rawData.trim().split('\n').forEach(line => {
        if(!line.trim()) return;
        const parts = line.split(/｜|\|/);
        addStudentToArray(parts[0], parts[1], parts[2], parts[3]);
    });
    saveStudents();
}

function addStudentToArray(name, day, course, time) {
    const full = name.trim();
    const nick = nicknameMap[full] || (full.length <= 2 ? full : full.substring(full.length - 2));
    students.push({ 
        id: 'xq_' + full + '_' + course, 
        name: full, 
        nickname: nick, 
        day: day.trim(), 
        course: course.trim(), 
        time: time.trim() 
    });
}

function saveStudents() {
    localStorage.setItem('xq_students_list', JSON.stringify(students));
}

// --- 功能函数 ---
function showModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function showToast(text) {
    const t = document.getElementById('toast');
    t.innerText = text; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function getWeekNum() {
    const startDate = new Date("2026-03-02"); // 设定的周期起始
    const today = new Date();
    const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
    return Math.max(1, Math.floor(diffDays / 7) + 1);
}

function getAttendanceData(id) {
    const data = localStorage.getItem(id);
    let parsed = data ? JSON.parse(data) : [];
    while (parsed.length < 20) parsed.push({ attended: false, score: 0 });
    return parsed;
}

// --- 添加学生逻辑 ---
function addNewStudents() {
    const input = document.getElementById('newStudentInput').value.trim();
    if (!input) return;

    const lines = input.split('\n');
    let count = 0;
    lines.forEach(line => {
        const parts = line.split(/｜|\|/);
        if (parts.length >= 4) {
            addStudentToArray(parts[0], parts[1], parts[2], parts[3]);
            count++;
        }
    });

    saveStudents();
    renderStudentList();
    closeModal('addStudentModal');
    document.getElementById('newStudentInput').value = '';
    showToast(`成功招募 ${count} 位新探险家！`);
}

// --- 批量出勤点亮逻辑 ---
function batchCheckIn() {
    const input = document.getElementById('attendanceInput').value.trim();
    if (!input) return;

    const names = input.split('\n').map(n => n.trim());
    const currentWeekIdx = getWeekNum() - 1;
    let count = 0;

    names.forEach(name => {
        // 找到对应的学生 ID (可能有同名但在不同班，所以这里匹配所有叫这个名字的人)
        const targets = students.filter(s => s.name === name);
        targets.forEach(s => {
            const records = getAttendanceData(s.id);
            if (!records[currentWeekIdx].attended) {
                records[currentWeekIdx].attended = true;
                records[currentWeekIdx].score = 3; // 默认签到给3星
                localStorage.setItem(s.id, JSON.stringify(records));
                count++;
            }
        });
    });

    renderStudentList();
    closeModal('attendanceModal');
    document.getElementById('attendanceInput').value = '';
    showToast(`任务完成！已为 ${count} 位探险家点亮第 ${currentWeekIdx+1} 关！`);
}

function resetAllData() {
    if(confirm("确定清空所有学生名单和记录吗？")) {
        localStorage.clear();
        location.reload();
    }
}

// --- 页面渲染逻辑 (保持原样并优化) ---
function renderStudentList() {
    const container = document.getElementById('main-container');
    container.innerHTML = '';
    const groupedByDay = {};

    students.forEach(s => {
        if (!groupedByDay[s.day]) groupedByDay[s.day] = {};
        const classKey = `${s.course} | ${s.time}`;
        if (!groupedByDay[s.day][classKey]) groupedByDay[s.day][classKey] = [];
        groupedByDay[s.day][classKey].push(s);
    });

    const sortedDays = Object.keys(groupedByDay).sort((a, b) => (dayOrder[a] || 99) - (dayOrder[b] || 99));

    sortedDays.forEach(day => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'day-group';
        groupDiv.innerHTML = `<div class="day-title">📅 ${day}</div>`;

        const classKeys = Object.keys(groupedByDay[day]);
        classKeys.forEach(classKey => {
            const classStudents = groupedByDay[day][classKey];
            const headerRow = document.createElement('div');
            headerRow.className = 'class-header-row';
            headerRow.innerHTML = `<h3 class="class-section-title">🏷️ ${classKey}</h3>`;
            groupDiv.appendChild(headerRow);

            const grid = document.createElement('div');
            grid.className = 'student-grid';
            classStudents.forEach(s => {
                const records = getAttendanceData(s.id);
                const attendCount = records.filter(r => r.attended).length;
                const totalScore = records.reduce((sum, r) => sum + (r.score || 0), 0);
                
                const card = document.createElement('div');
                card.className = 'student-card';
                card.onclick = () => openMap(s);
                card.innerHTML = `
                    <div class="student-header">
                        <div class="student-name">⭐ ${s.name} <span class="student-nickname">(${s.nickname})</span></div>
                    </div>
                    <div class="student-info">📘 ${s.course}</div>
                    <div class="stats-container">
                        <span class="stat-attend">进度: ${attendCount}/20</span>
                        <span class="stat-reward">总计: <span class="highlight-score">${totalScore}</span> ⭐</span>
                    </div>
                `;
                grid.appendChild(card);
            });
            groupDiv.appendChild(grid);
        });
        container.appendChild(groupDiv);
    });
}

// --- 地图渲染 (保持原样) ---
let currentSId = null;
function openMap(student) {
    currentSId = student.id;
    document.getElementById('mapModal').style.display = 'flex';
    document.getElementById('modalStudentName').innerText = `🚀 ${student.name} 的航线`;
    document.getElementById('modalStudentInfo').innerText = `${student.course} | ${student.time}`;
    renderMap();
}

function renderMap() {
    const container = document.getElementById('mapContainer');
    container.innerHTML = '';
    const records = getAttendanceData(currentSId);
    const currentWeekIdx = getWeekNum() - 1;

    for (let i = 0; i < 20; i++) {
        const row = document.createElement('div');
        row.className = 'level-row';
        const wrapper = document.createElement('div');
        wrapper.className = 'node-wrapper';

        if (i === currentWeekIdx) {
            wrapper.innerHTML += `<div class="current-week-tag">📍 本周课程</div>`;
        }

        const node = document.createElement('div');
        node.className = `level-node ${records[i].attended ? 'completed' : ''}`;
        node.innerHTML = records[i].attended ? '🌟' : i + 1;
        
        node.onclick = () => {
            records[i].attended = !records[i].attended;
            if(records[i].attended) records[i].score = 3;
            localStorage.setItem(currentSId, JSON.stringify(records));
            renderMap();
        };

        const scoreCtrl = document.createElement('div');
        scoreCtrl.className = 'score-controller';
        scoreCtrl.innerHTML = `
            <div class="stars-display">${'⭐'.repeat(Math.min(records[i].score, 5))}</div>
            <div class="score-buttons-row">
                <button class="score-btn minus" onclick="updateScore(${i}, -1, event)">-</button>
                <div class="score-display">${records[i].score}</div>
                <button class="score-btn plus" onclick="updateScore(${i}, 1, event)">+</button>
            </div>
        `;

        wrapper.appendChild(node);
        wrapper.appendChild(scoreCtrl);
        row.appendChild(wrapper);
        container.appendChild(row);
    }
}

function updateScore(idx, delta, event) {
    event.stopPropagation();
    const records = getAttendanceData(currentSId);
    records[idx].score = Math.max(0, records[idx].score + delta);
    localStorage.setItem(currentSId, JSON.stringify(records));
    renderMap();
}

function closeMap() { document.getElementById('mapModal').style.display = 'none'; renderStudentList(); }

// 启动！
renderStudentList();
</script>
</body>
</html>
