<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小Q老师 - 星际闯关指挥中心 V2.5</title>
<style>
    :root {
        --primary: #ff6b6b; --secondary: #4ecdc4; --gold: #ffd700; --bg-color: #f8f9fa;
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background-image: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
        margin: 0; padding: 20px; color: #333; min-height: 100vh;
    }

    /* 管理工具栏 */
    .admin-bar {
        max-width: 1200px; margin: 0 auto 20px;
        display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .admin-btn {
        padding: 10px 20px; border: none; border-radius: 50px;
        background: white; color: #2c3e50; font-weight: bold;
        cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s;
    }
    .admin-btn:hover { background: var(--secondary); color: white; transform: translateY(-2px); }
    .admin-btn.add { background: var(--primary); color: white; }

    /* 班级布局 */
    .day-group { margin-bottom: 40px; background: rgba(255,255,255,0.3); padding: 20px; border-radius: 20px; }
    .day-title { font-size: 1.8em; font-weight: 800; border-bottom: 3px solid var(--secondary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .class-section-title { font-size: 1.1em; color: #34495e; background: #e0eafc; padding: 5px 15px; border-radius: 5px; display: inline-block; margin: 15px 0; }

    /* 学生卡片 */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .student-card { 
        background: white; border-radius: 15px; padding: 20px; cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; transition: 0.3s;
        border-left: 6px solid var(--secondary);
    }
    .student-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .delete-btn {
        position: absolute; top: 10px; right: 10px; width: 24px; height: 24px;
        background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        color: #999; font-size: 14px; opacity: 0; transition: 0.3s;
    }
    .student-card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { background: #ff7675; color: white; }

    .stats-row { margin-top: 10px; font-size: 0.85em; font-weight: bold; color: #666; display: flex; justify-content: space-between; }
    .highlight-score { color: #e74c3c; font-size: 1.1em; }

    /* 弹窗通用 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    
    /* 地图弹窗专用 */
    .map-modal-content { background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); color: white; max-width: 650px; }
    .level-node { width: 60px; height: 60px; border-radius: 50%; background: #2c3e50; display: flex; justify-content: center; align-items: center; margin: 20px auto; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.3s; position: relative; }
    .level-node.completed { background: linear-gradient(145deg, #ffd700, #f39c12); box-shadow: 0 0 20px var(--gold); border-color: white; color: white; }
    .current-marker { position: absolute; top: -25px; color: #ff7675; font-size: 0.8em; font-weight: bold; white-space: nowrap; }

    textarea { width: 100%; height: 120px; margin: 15px 0; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: white; padding: 10px 30px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 2000; }
    .toast.show { opacity: 1; top: 40px; }
</style>
</head>
<body>

<h1 style="text-align:center;">👨‍🏫 小Q老师 - 星际闯关指挥中心</h1>

<div class="admin-bar">
    <button class="admin-btn add" onclick="openModal('addModal')">➕ 录入新学员</button>
    <button class="admin-btn" onclick="openModal('batchModal')">📍 批量出勤点亮</button>
    <button class="admin-btn" onclick="clearAll()">🔄 重置系统</button>
</div>

<div id="main-container"></div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h3>🚀 招募新探险家</h3>
        <p style="font-size: 0.8em; color: #666;">格式：姓名|周几|课程|时间<br>例：王小明|周六|发现世界|09:00-10:00</p>
        <textarea id="addInput" placeholder="支持批量粘贴..."></textarea>
        <div style="text-align:right;">
            <button onclick="closeModal('addModal')">取消</button>
            <button class="admin-btn add" onclick="saveNewStudents()">确认添加</button>
        </div>
    </div>
</div>

<div class="modal" id="batchModal">
    <div class="modal-content">
        <h3>✨ 批量点亮本周星球 (第5周)</h3>
        <p style="font-size: 0.8em; color: #666;">粘贴名字，每行一个。系统自动点亮 2026-04-03 对应的关卡。</p>
        <textarea id="batchInput" placeholder="粘贴今日到课名单..."></textarea>
        <div style="text-align:right;">
            <button onclick="closeModal('batchModal')">取消</button>
            <button class="admin-btn" onclick="batchCheckIn()">一键点亮</button>
        </div>
    </div>
</div>

<div class="modal" id="mapModal">
    <div class="modal-content map-modal-content">
        <h2 id="mapName" style="text-align:center; color: var(--gold);">学生地图</h2>
        <div id="mapNodesContainer"></div>
        <div style="text-align:center; margin-top: 20px;">
            <button onclick="closeModal('mapModal')">返回指挥中心</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">提示信息</div>

<script>
    // --- 逻辑引用数据 ---
    const START_DATE = "2026-03-02"; // 第1周开始时间
    let students = JSON.parse(localStorage.getItem('xq_students_v2')) || [];
    let currentViewingId = null;

    // --- 计算周数 ---
    function getWeekNum() {
        const start = new Date(START_DATE);
        const today = new Date(); // 2026-04-03
        const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
        return Math.floor(diff / 7) + 1; // 结果为 5
    }

    // --- 批量出勤点亮 (功能检查点) ---
    function batchCheckIn() {
        const input = document.getElementById('batchInput').value.trim();
        if (!input) return;

        const names = input.split('\n').map(n => n.trim());
        const currentWeekIdx = getWeekNum() - 1; // 索引为 4
        let count = 0;

        names.forEach(name => {
            const student = students.find(s => s.name === name);
            if (student) {
                // 更新该学生的本地出勤存储
                let records = JSON.parse(localStorage.getItem('rec_' + student.id)) || Array(20).fill({attended: false, score: 0});
                if (!records[currentWeekIdx].attended) {
                    records[currentWeekIdx] = { attended: true, score: 3 }; // 点亮并送3星
                    localStorage.setItem('rec_' + student.id, JSON.stringify(records));
                    count++;
                }
            }
        });

        renderList();
        closeModal('batchModal');
        showToast(`操作成功！已点亮 ${count} 位学员的第 ${currentWeekIdx + 1} 关星球！`);
        document.getElementById('batchInput').value = '';
    }

    // --- 基础功能 ---
    function saveNewStudents() {
        const input = document.getElementById('addInput').value.trim();
        if(!input) return;
        input.split('\n').forEach(line => {
            const parts = line.split(/\||｜/);
            if(parts.length >= 4) {
                const id = 'id_' + Date.now() + Math.random().toString(36).substr(2,4);
                students.push({ id, name: parts[0].trim(), day: parts[1].trim(), course: parts[2].trim(), time: parts[3].trim() });
            }
        });
        localStorage.setItem('xq_students_v2', JSON.stringify(students));
        renderList();
        closeModal('addModal');
        document.getElementById('addInput').value = '';
    }

    function deleteStudent(e, id) {
        e.stopPropagation();
        if(confirm("确定移除该学员吗？其闯关记录也将删除。")) {
            students = students.filter(s => s.id !== id);
            localStorage.removeItem('rec_' + id);
            localStorage.setItem('xq_students_v2', JSON.stringify(students));
            renderList();
        }
    }

    function openMap(s) {
        currentViewingId = s.id;
        document.getElementById('mapName').innerText = `🚀 ${s.name} 的星际航线`;
        renderMapNodes();
        openModal('mapModal');
    }

    function renderMapNodes() {
        const container = document.getElementById('mapNodesContainer');
        container.innerHTML = '';
        const records = JSON.parse(localStorage.getItem('rec_' + currentViewingId)) || Array(20).fill({attended: false, score: 0});
        const currentWeekIdx = getWeekNum() - 1;

        for(let i=0; i<20; i++) {
            const node = document.createElement('div');
            node.className = `level-node ${records[i].attended ? 'completed' : ''}`;
            node.innerHTML = records[i].attended ? '🌟' : i + 1;
            
            if(i === currentWeekIdx) {
                node.innerHTML += `<span class="current-marker">📍 本周目标</span>`;
            }

            node.onclick = () => {
                records[i].attended = !records[i].attended;
                records[i].score = records[i].attended ? 3 : 0;
                localStorage.setItem('rec_' + currentViewingId, JSON.stringify(records));
                renderMapNodes();
            };
            container.appendChild(node);
        }
    }

    function renderList() {
        const container = document.getElementById('main-container');
        container.innerHTML = '';
        const dayOrder = {'周一':1,'周二':2,'周三':3,'周四':4,'周五':5,'周六':6,'周日':7};
        
        const grouped = {};
        students.forEach(s => {
            if(!grouped[s.day]) grouped[s.day] = [];
            grouped[s.day].push(s);
        });

        Object.keys(grouped).sort((a,b)=>dayOrder[a]-dayOrder[b]).forEach(day => {
            const div = document.createElement('div');
            div.className = 'day-group';
            div.innerHTML = `<div class="day-title">📅 ${day}</div>`;
            const grid = document.createElement('div');
            grid.className = 'student-grid';
            
            grouped[day].forEach(s => {
                const rec = JSON.parse(localStorage.getItem('rec_' + s.id)) || [];
                const totalStars = rec.reduce((sum, r) => sum + (r.score || 0), 0);
                const card = document.createElement('div');
                card.className = 'student-card';
                card.onclick = () => openMap(s);
                card.innerHTML = `
                    <div class="delete-btn" onclick="deleteStudent(event, '${s.id}')">×</div>
                    <div style="font-weight:bold; font-size:1.1em;">${s.name}</div>
                    <div style="font-size:0.8em; color:#888;">${s.course} | ${s.time}</div>
                    <div class="stats-row">
                        <span>进度: ${rec.filter(r=>r.attended).length}/20</span>
                        <span>能量: <span class="highlight-score">${totalStars}</span> ⭐</span>
                    </div>
                `;
                grid.appendChild(card);
            });
            div.appendChild(grid);
            container.appendChild(div);
        });
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; renderList(); }
    function showToast(m) { 
        const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 2500);
    }
    function clearAll() { if(confirm("清空所有数据？")) { localStorage.clear(); location.reload(); } }

    renderList();
</script>
</body>
</html>
